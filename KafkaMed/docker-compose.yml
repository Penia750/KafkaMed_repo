version: "3.9"

services:

  # ----------------------------------------------------------------
  # Zookeeper — coordinador de Kafka
  # ----------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: kafkamed_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Kafka Broker
  # ----------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafkamed_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ----------------------------------------------------------------
  # MongoDB — persistencia de predicciones
  # ----------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: kafkamed_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js:ro
    environment:
      MONGO_INITDB_DATABASE: kafkamed
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Producer — lee heart.csv y publica en Kafka
  # ----------------------------------------------------------------
  producer:
    build: ./producer
    container_name: kafkamed_producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./datos:/app/datos
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATASET_PATH=/app/datos/heart.csv
      - INTERVAL_SECONDS=2

  # ----------------------------------------------------------------
  # Consumer — Spark Structured Streaming lee de Kafka y predice
  # ----------------------------------------------------------------
  consumer:
    build: ./consumer
    container_name: kafkamed_consumer
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./datos:/app/datos
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MONGO_URI=mongodb://mongo:27017/
      - MODEL_PATH=/app/datos/modelo_cardiaco

  # ----------------------------------------------------------------
  # API Flask — expone los 4 endpoints
  # ----------------------------------------------------------------
  api:
    build: ./api
    container_name: kafkamed_api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
